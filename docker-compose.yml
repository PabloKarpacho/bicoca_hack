name: hack

services:
  postgres_db:
    image: postgres:11
    container_name: ${DB_POSTGRES_CONTAINER_NAME}
    # restart: always
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_POSTGRES_NAME}
    ports:
      - "${DB_POSTGRES_PORT}:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USERNAME} -d ${DB_POSTGRES_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      hack_network:
        aliases:
          - postgres

  pgadmin:
    image: dpage/pgadmin4:9.8
    container_name: ${PGADMIN_CONTAINER_NAME}
    # restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres_db
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - hack_network

  minio_db:
    image: quay.io/minio/minio
    container_name: ${S3_CONTAINER_NAME}
    environment:
      MINIO_ROOT_USER: ${S3_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${S3_ROOT_PASSWORD}
    ports:
      - "${S3_API_PORT}:9000"
      - "${S3_CONSOLE_PORT}:7001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":${S3_CONSOLE_PORT}"
    networks:
      hack_network:
        aliases:
          - minio

  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: ${QDRANT_CONTAINER_NAME:-qdrant}
    # restart: always
    environment:
      QDRANT_HOST: ${QDRANT_HOST:-0.0.0.0}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      hack_network:
        aliases:
          - qdrant

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME}
    env_file:
      - .env
    environment:
      DB_POSTGRES_URL_ASYNC: ${DOCKER_DB_POSTGRES_URL_ASYNC}
      DB_POSTGRES_URL_SYNC: ${DOCKER_DB_POSTGRES_URL_SYNC}
      S3_ENDPOINT: ${DOCKER_S3_ENDPOINT}
      QDRANT_URL: ${DOCKER_QDRANT_URL}
      APP_PORT: ${APP_PORT}
      DEBUG: ${DEBUG}
    ports:
      - "${APP_PORT}:8000"
    depends_on:
      postgres_db:
        condition: service_healthy
      minio_db:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - hack_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${FRONTEND_CONTAINER_NAME}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - hack_network

networks:
  hack_network:
    driver: bridge
    name: hack_network

volumes:
  minio_data:
  pgadmin_data:
  postgres_data:
  qdrant_data:
